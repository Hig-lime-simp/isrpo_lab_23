<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework</title>
</head>
<body>
    <form action="">
        <div class="inputForm">
            <input type="text" id="InputName" placeholder="Введите ФИО">
            <input type="text" id="InputAge" placeholder="Введите возраст">
            <input type="text" id="InputCity" placeholder="Введите ваш город">
            <input type="text" id="InputHobby" placeholder="Введите ваше хобби">
            <input type="submit" value="Отправить">
        </div>
    </form>
    <div class="outForm">
        <p id="OutName"></p>
        <p id="OutAge"></p>
        <p id="OutCity"></p>
        <p id="OutHobby"></p>
        <button id="clear">Очистить</button>
    </div>
</body>
</html>
