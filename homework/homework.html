<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework</title>
    <link rel="stylesheet" href="/homework/homewokr.css">
</head>
<body>
    <form>
        <div class="inputForm">
            <input type="text" id="InputName" placeholder="Введите ФИО" class="input">
            <input type="text" id="InputAge" placeholder="Введите возраст" class="input">
            <input type="text" id="InputCity" placeholder="Введите ваш город" class="input">
            <input type="text" id="InputHobby" placeholder="Введите ваше хобби" class="input">
            <input type="submit" value="Отправить" class="submitBtn">
        </div>
    </form>
    <div class="outForm">
        <p id="OutName" class="output"></p>
        <p id="OutAge" class="output"></p>
        <p id="OutCity" class="output"></p>
        <p id="OutHobby" class="output"></p>
        <button id="clear" class="clearBtn">Очистить</button>
    </div>
    <script type="module" src="/homework/homework.js"></script>
</body>
</html>
